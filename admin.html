<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse Admin · Script Manager</title>
    <!-- CodeMirror for VS Code-style editing -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/lua/lua.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #12122a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .logo h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #d4af37 0%, #f5e6a3 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #a0a0c0;
            font-size: 14px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 15px;
        }
        .login-box input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .btn {
            background: linear-gradient(135deg, #d4af37 0%, #f5e6a3 100%);
            color: #0a0a0a;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
            width: auto;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            color: white;
        }
        .hidden { display: none !important; }
        .access-denied { text-align: center; padding: 60px 20px; }
        .access-denied h2 { color: #ff6b6b; font-size: 28px; margin-bottom: 20px; }
        .access-denied p { color: #a0a0c0; margin-bottom: 30px; }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .upload-area {
            border: 2px dashed rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: rgba(212, 175, 55, 0.6);
            background: rgba(212, 175, 55, 0.05);
        }
        .upload-area.dragover {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
        }
        .upload-icon { font-size: 48px; margin-bottom: 10px; }
        .upload-text { color: #c0c0e0; }
        
        .paste-area { margin: 20px 0; }
        .paste-area textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 15px;
            resize: vertical;
        }
        .paste-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .paste-controls input {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            color: white;
        }
        
        .script-list { margin: 20px 0; }
        .script-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .script-info { color: white; }
        .script-name { font-weight: 600; color: #d4af37; }
        .script-id { font-size: 12px; color: #a0a0c0; }
        .script-actions { display: flex; gap: 8px; }
        
        /* Editor Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background: #1e1e2e;
            border: 1px solid #d4af37;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 15px 20px;
            background: #2a2a40;
            border-bottom: 1px solid #d4af37;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { color: #d4af37; }
        .modal-body { flex: 1; overflow: hidden; }
        .CodeMirror {
            height: 100%;
            font-size: 14px;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .modal-footer {
            padding: 15px 20px;
            background: #2a2a40;
            border-top: 1px solid #d4af37;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .success-message { color: #4caf50; font-size: 14px; margin-top: 10px; }
        .error-message { color: #ff6b6b; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🌑 ECLIPSE ADMIN</h1>
        </div>
        <div class="subtitle">Script Manager · Restricted Access</div>

        <div id="accessDenied" class="access-denied hidden">
            <h2>⛔ ACCESS DENIED</h2>
            <p>You are not whitelisted to view this page.</p>
        </div>

        <div id="loginBox" class="login-box">
            <input type="password" id="passwordInput" placeholder="Enter admin password">
            <button class="btn" onclick="login()">🔐 Login</button>
            <div id="loginError" class="error-message"></div>
        </div>

        <div id="adminPanel" class="hidden">
            <div class="header-actions">
                <h3 style="color: #d4af37;">📜 Script Management</h3>
                <button class="btn btn-small" onclick="logout()">🚪 Logout</button>
            </div>
            
            <!-- Drag & Drop Upload -->
            <div class="upload-area" id="dropArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Drag & drop .lua file here<br>or click to browse</div>
                <input type="file" id="fileInput" accept=".lua" style="display: none;">
            </div>
            
            <!-- Paste Area -->
            <div class="paste-area">
                <textarea id="codeInput" placeholder="Paste your Lua code here..."></textarea>
                <div class="paste-controls">
                    <input type="text" id="gameIdInput" placeholder="Game ID (e.g., 1537690962 or loader)">
                    <button class="btn btn-small" onclick="uploadPasted()">📤 Upload Pasted</button>
                </div>
            </div>
            
            <div id="uploadStatus" class="success-message"></div>
            
            <div class="script-list" id="scriptList">
                <p style="color: #a0a0c0; text-align: center;">Loading scripts...</p>
            </div>
        </div>
    </div>

    <!-- Editor Modal -->
    <div id="editorModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ Editing: <span id="editingGameId"></span>.lua</h3>
                <button class="btn btn-small" onclick="closeEditor()">✕ Close</button>
            </div>
            <div class="modal-body">
                <textarea id="editorTextarea"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-small" onclick="closeEditor()">Cancel</button>
                <button class="btn btn-small" onclick="saveEditor()">💾 Save (Ctrl+S)</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "EclipseAdmin2024!";
        const API_URL = "https://eclipse-discordbot-production.up.railway.app";
        const ADMIN_SECRET = "EclipseAdmin2024!SecretKey123";
        
        let isAuthenticated = false;
        let editor = null;
        let currentEditingGameId = null;
        
        // Initialize CodeMirror
        function initEditor() {
            const textarea = document.getElementById('editorTextarea');
            editor = CodeMirror.fromTextArea(textarea, {
                mode: 'lua',
                theme: 'dracula',
                lineNumbers: true,
                indentUnit: 4,
                tabSize: 4,
                lineWrapping: true,
                extraKeys: {
                    'Ctrl-S': function() { saveEditor(); return false; },
                    'Cmd-S': function() { saveEditor(); return false; }
                }
            });
        }
        
        function openEditor(gameId) {
            fetch(`${API_URL}/api/admin/script?gameId=${gameId}`)
                .then(r => r.json())
                .then(data => {
                    if (data.content !== undefined) {
                        currentEditingGameId = gameId;
                        document.getElementById('editingGameId').textContent = gameId;
                        editor.setValue(data.content || '');
                        document.getElementById('editorModal').classList.remove('hidden');
                        setTimeout(() => editor.refresh(), 50);
                    } else {
                        alert('Failed to load script');
                    }
                })
                .catch(e => alert('Failed to load script'));
        }
        
        function closeEditor() {
            document.getElementById('editorModal').classList.add('hidden');
            currentEditingGameId = null;
        }
        
        function saveEditor() {
            if (!currentEditingGameId) return;
            const content = editor.getValue();
            
            fetch(`${API_URL}/api/admin/upload`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ gameId: currentEditingGameId, content })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('✅ Saved!');
                    loadScripts();
                } else {
                    alert('❌ Save failed');
                }
            });
        }
        
        async function login() {
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('loginError');
            
            if (password !== ADMIN_PASSWORD) {
                errorDiv.textContent = '❌ Invalid password';
                return;
            }
            
            const identifier = prompt("Enter your Discord ID:");
            if (!identifier) return;
            
            try {
                const response = await fetch(`${API_URL}/api/admin/check-whitelist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier })
                });
                const data = await response.json();
                
                if (!data.whitelisted) {
                    document.getElementById('loginBox').classList.add('hidden');
                    document.getElementById('accessDenied').classList.remove('hidden');
                    return;
                }
                
                isAuthenticated = true;
                initEditor();
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadScripts();
                setupDragDrop();
            } catch (e) {
                errorDiv.textContent = '❌ Connection failed';
            }
        }
        
        function logout() {
            isAuthenticated = false;
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('passwordInput').value = '';
        }
        
        function setupDragDrop() {
            const dropArea = document.getElementById('dropArea');
            const fileInput = document.getElementById('fileInput');
            
            dropArea.addEventListener('click', () => fileInput.click());
            
            dropArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropArea.classList.add('dragover');
            });
            
            dropArea.addEventListener('dragleave', () => {
                dropArea.classList.remove('dragover');
            });
            
            dropArea.addEventListener('drop', (e) => {
                e.preventDefault();
                dropArea.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file && file.name.endsWith('.lua')) {
                    uploadFile(file);
                } else {
                    alert('Please drop a .lua file');
                }
            });
            
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) uploadFile(file);
            });
        }
        
        async function uploadFile(file) {
            const gameId = file.name.replace('.lua', '');
            const content = await file.text();
            await uploadScript(gameId, content, file.name);
        }
        
        async function uploadPasted() {
            const gameId = document.getElementById('gameIdInput').value.trim();
            const content = document.getElementById('codeInput').value;
            
            if (!gameId) { alert('Please enter a Game ID'); return; }
            if (!content) { alert('Please paste some code'); return; }
            
            await uploadScript(gameId, content, `${gameId}.lua`);
            document.getElementById('codeInput').value = '';
            document.getElementById('gameIdInput').value = '';
        }
        
        async function uploadScript(gameId, content, fileName) {
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.textContent = 'Uploading...';
            
            try {
                const response = await fetch(`${API_URL}/api/admin/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gameId, content })
                });
                
                const data = await response.json();
                if (data.success) {
                    statusDiv.textContent = `✅ ${fileName || gameId + '.lua'} uploaded!`;
                    loadScripts();
                } else {
                    statusDiv.textContent = `❌ Upload failed`;
                }
            } catch (e) {
                statusDiv.textContent = '❌ Connection error';
            }
            
            setTimeout(() => statusDiv.textContent = '', 3000);
        }
        
        async function loadScripts() {
            const listDiv = document.getElementById('scriptList');
            try {
                const response = await fetch(`${API_URL}/api/admin/scripts`);
                const scripts = await response.json();
                
                if (scripts.length === 0) {
                    listDiv.innerHTML = '<p style="color: #a0a0c0; text-align: center;">No scripts uploaded yet.</p>';
                    return;
                }
                
                listDiv.innerHTML = scripts.map(s => `
                    <div class="script-item">
                        <div class="script-info">
                            <div class="script-name">${s.name}</div>
                            <div class="script-id">Game ID: ${s.gameId}</div>
                        </div>
                        <div class="script-actions">
                            <button class="btn btn-small" onclick="openEditor('${s.gameId}')">✏️ Edit</button>
                            <button class="btn btn-small btn-danger" onclick="deleteScript('${s.gameId}')">🗑️ Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                listDiv.innerHTML = '<p style="color: #ff6b6b;">Failed to load scripts</p>';
            }
        }
        
        async function deleteScript(gameId) {
            if (!confirm(`Delete ${gameId}?`)) return;
            try {
                await fetch(`${API_URL}/api/admin/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gameId })
                });
                loadScripts();
            } catch (e) {
                alert('Failed to delete');
            }
        }

        // Whitelist functions (with secret key)
        async function addToWhitelist() {
            const input = document.getElementById('whitelistUserInput');
            const identifier = input.value.trim();
            if (!identifier) return;
            
            try {
                await fetch(`${API_URL}/api/admin/whitelist/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        identifier: identifier,
                        secret: ADMIN_SECRET
                    })
                });
                input.value = '';
                loadWhitelist();
            } catch (e) {
                alert('Failed to add to whitelist');
            }
        }
        
        async function removeFromWhitelist(identifier) {
            try {
                await fetch(`${API_URL}/api/admin/whitelist/remove`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        identifier: identifier,
                        secret: ADMIN_SECRET
                    })
                });
                loadWhitelist();
            } catch (e) {
                alert('Failed to remove from whitelist');
            }
        }
        
        async function loadWhitelist() {
            const listDiv = document.getElementById('whitelistList');
            try {
                const response = await fetch(`${API_URL}/api/admin/whitelist`);
                const whitelist = await response.json();
                
                listDiv.innerHTML = whitelist.map(w => `
                    <div class="whitelist-item">
                        <span>${w.identifier}</span>
                        <button class="btn btn-small btn-danger" onclick="removeFromWhitelist('${w.identifier}')" style="padding: 4px 10px;">Remove</button>
                    </div>
                `).join('');
            } catch (e) {
                listDiv.innerHTML = '<p style="color: #ff6b6b;">Failed to load whitelist</p>';
            }
        }
    </script>
</body>
</html>
