<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse · Gateway</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #12122a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(147, 112, 219, 0.4);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .logo h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #9370DB 0%, #d4af37 50%, #9370DB 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #a0a0c0;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .description {
            color: #c0c0e0;
            font-size: 16px;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        .loading {
            color: #9370DB;
            font-size: 16px;
            margin: 20px 0;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 3px solid rgba(147, 112, 219, 0.2);
            border-top: 3px solid #9370DB;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer {
            color: #606080;
            font-size: 13px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>ECLIPSE</h1>
        </div>
        <div class="subtitle">Key Gateway</div>
        <div class="description">
            Preparing your secure verification...
        </div>
        
        <div class="spinner"></div>
        <div class="loading" id="loading">Creating session...</div>
        
        <div class="footer">
            You'll be redirected to complete verification.
        </div>
    </div>

    <script>
        const API_URL = "https://eclipse-discordbot-production.up.railway.app";
        const SECRET_KEY = "EclipseGateway2024!";
        const WORKINK_URL = "https://work.ink/2wlq/eclipse-key";
        
        let mouseMoved = false;
        document.addEventListener('mousemove', function() {
            mouseMoved = true;
        });
        
        if (navigator.webdriver || (navigator.languages && navigator.languages.length === 0)) {
            document.body.innerHTML = '<h1 style="color:white;text-align:center;padding:50px;">⛔ Automated browsers not allowed</h1>';
            throw new Error('Headless browser detected');
        }
        
        function generateToken() {
            const timestamp = Date.now();
            const random = Math.random().toString(36).substring(2, 15);
            const data = `${timestamp}|${random}`;
            let encrypted = '';
            for (let i = 0; i < data.length; i++) {
                encrypted += String.fromCharCode(data.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length));
            }
            return btoa(encrypted);
        }
        
        async function startVerification() {
            const token = generateToken();
            const loading = document.getElementById('loading');
            loading.textContent = 'Creating secure session...';
            
            try {
                await fetch(`${API_URL}/api/create-session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, platform: 'workink' })
                });
                
                localStorage.setItem('eclipse_key_token', token);
                
                loading.textContent = 'Redirecting to verification...';
                setTimeout(() => {
                    window.location.href = WORKINK_URL;
                }, 500);
                
            } catch (error) {
                loading.textContent = 'Error creating session. Please try again.';
            }
        }
        
        window.addEventListener('load', function() {
            setTimeout(() => {
                startVerification();
            }, 500);
        });
    </script>
</body>
</html>
