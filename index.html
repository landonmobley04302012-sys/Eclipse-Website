<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse · Get Key</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #12122a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Inter', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .logo h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #d4af37 0%, #f5e6a3 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }
        .subtitle {
            color: #a0a0c0;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .description {
            color: #c0c0e0;
            font-size: 16px;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn {
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-linkvertise {
            background: linear-gradient(135deg, #1a1a40 0%, #2a2a60 100%);
            border: 1px solid #4a4a8a;
            color: #ffffff;
        }
        .btn-linkvertise:hover {
            background: linear-gradient(135deg, #252550 0%, #353575 100%);
            border-color: #6a6aaa;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(74, 74, 138, 0.3);
        }
        .btn-lootlabs {
            background: linear-gradient(135deg, #2a1a30 0%, #3a2a45 100%);
            border: 1px solid #8a4a9a;
            color: #ffffff;
        }
        .btn-lootlabs:hover {
            background: linear-gradient(135deg, #352540 0%, #453555 100%);
            border-color: #aa6aba;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(138, 74, 154, 0.3);
        }
        .footer {
            color: #606080;
            font-size: 13px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            margin-top: 10px;
        }
        .footer a {
            color: #d4af37;
            text-decoration: none;
        }
        .footer a:hover { text-decoration: underline; }
        .icon { font-size: 22px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>ECLIPSE</h1>
        </div>
        <div class="subtitle">Key System</div>
        <div class="description">
            Choose your preferred method to get your key.
        </div>
        
        <div class="button-group">
            <a href="gateway.html" class="btn btn-linkvertise">
                <span class="icon">🔗</span>
                Continue to Verification
            </a>
        </div>
        
        <div class="footer">
            Already have a key? <a href="https://discord.gg/4w6VtzFa5z" target="_blank">Join our Discord</a><br>
            to redeem and access the script.
        </div>
    </div>
</body>
</html>
